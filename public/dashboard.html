<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items - Brain Trust</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        nav h1 {
            font-size: 24px;
            color: #ffffff;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #4da6ff;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .add-item-btn {
            background: #4da6ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s;
        }

        .add-item-btn:hover {
            transform: scale(1.05);
            background: #3d8bff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .item-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #ddd;
        }

        .item-info {
            padding: 20px;
        }

        .item-name {
            font-size: 20px;
            margin-bottom: 10px;
            color: #4da6ff;
        }

        .item-category {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .quantity-input {
            width: 60px;
            padding: 5px;
            border-radius: 5px;
            border: none;
            text-align: center;
        }

        .update-qty {
            background: #4da6ff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .modal-content button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }

        .save-btn {
            background: #4da6ff;
            color: white;
        }

        .cancel-btn {
            background: #ddd;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            grid-column: 1 / -1;
        }

        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>BRAIN TRUST</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="#" id="dashboard-link" style="color: #4da6ff;">Dashboard</a>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div>
                <h1>My Items</h1>
                <div class="user-info" id="userInfo"></div>
            </div>
            <button class="add-item-btn" id="addItemBtn">+ Add New Item</button>
        </div>

        <div class="items-grid" id="itemsGrid">
            <div class="empty-state">
                <h3>No items yet</h3>
                <p>Click the "Add New Item" button to start adding your products</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Item Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Item</h2>
            <form id="itemForm">
                <input type="text" id="itemName" placeholder="Item Name" required>
                
                <select id="itemCategory" required>
                    <option value="">Select Category</option>
                    <option value="Shoes">Shoes</option>
                    <option value="Shirts">Shirts</option>
                    <option value="Trousers">Trousers</option>
                    <option value="Sweaters">Sweaters</option>
                    <option value="Underwear">Underwear</option>
                    <option value="Caps">Caps</option>
                    <option value="Jeans">Jeans</option>
                    <option value="Other">Other</option>
                </select>
                
                <input type="number" id="itemQuantity" placeholder="Quantity" min="1" value="1" required>
                
                <input type="file" id="itemImage" accept="image/*">
                
                <div style="text-align: right;">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save-btn">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let items = [];

        // Check authentication on page load
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                
                if (data.authenticated) {
                    currentUser = data.user;
                    document.getElementById('userInfo').innerHTML = 
                        Welcome, <strong>${data.user.username}</strong>;
                    loadItems();
                } else {
                    // Redirect to login if not authenticated
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = 'login.html';
            }
        }

        // Load user items
        async function loadItems() {
            try {
                const response = await fetch(/api/items/${currentUser.id});
                items = await response.json();
                displayItems();
            } catch (error) {
                console.error('Failed to load items:', error);
            }
        }

        // Display items in grid
        function displayItems() {
            const grid = document.getElementById('itemsGrid');
            
            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No items yet</h3>
                        <p>Click the "Add New Item" button to start adding your products</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="item-card" data-id="${item.id}">
                    <img src="${item.image_url || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                         alt="${item.item_name}" 
                         class="item-image"
                         onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="item-info">
                        <h3 class="item-name">${item.item_name}</h3>
                        <p class="item-category">Category: ${item.category || 'Other'}</p>
                        <div class="item-quantity">
                            <span>Quantity:</span>
                            <input type="number" class="quantity-input" value="${item.quantity}" min="1" 
                                   onchange="updateQuantity(${item.id}, this.value)">
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Delete Item</button>
                    </div>
                </div>
            `).join('');
        }

        // Update quantity
        async function updateQuantity(itemId, quantity) {
            try {
                const response = await fetch(/api/items/${itemId}, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });
                
                if (response.ok) {
                    const item = items.find(i => i.id === itemId);
                    if (item) item.quantity = parseInt(quantity);
                }
            } catch (error) {
                console.error('Failed to update quantity:', error);
            }
        }

        // Delete item
        async function deleteItem(itemId) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const response = await fetch(/api/items/${itemId}, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    items = items.filter(i => i.id !== itemId);
                    displayItems();
                }
            } catch (error) {
                console.error('Failed to delete item:', error);
            }
        }

        // Modal functions
        function openModal() {
            document.getElementById('itemModal').style.display = 'flex';
            document.getElementById('itemForm').reset();
            document.getElementById('modalTitle').textContent = 'Add New Item';
        }

        function closeModal() {
            document.getElementById('itemModal').style.display = 'none';
        }

        // Add item
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('user_id', currentUser.id);
            formData.append('item_name', document.getElementById('itemName').value);
            formData.append('category', document.getElementById('itemCategory').value);
            formData.append('quantity', document.getElementById('itemQuantity').value);
            
            const imageFile = document.getElementById('itemImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }
            
            try {
                const response = await fetch('/api/items', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.item) {
                        items.unshift(data.item);
                    } else {
                        // Reload all items if we don't get the new one back
                        await loadItems();
                    }
                    displayItems();
                    closeModal();
                }
            } catch (error) {
                console.error('Failed to add item:', error);
                alert('Failed to add item. Please try again.');
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Logout failed:', error);
            }
        });

        // Event listeners
        document.getElementById('addItemBtn').addEventListener('click', openModal);

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('itemModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // Initialize
        checkAuth();
    </script>
</body>
</html>
